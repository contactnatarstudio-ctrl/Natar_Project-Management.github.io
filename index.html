<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NataR Studio — Portofolio & Manajemen Proyek</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        navy:'#14213D', navy2:'#1B2C50', navy3:'#24386A',
        royal:'#2A4C8A', royal2:'#3A5FA8', sky:'#8AA9D6',
        steel:'#787878', line:'#E6E9F0', soft:'#F4F6FB', paper:'#FBFCFE'
      },
      fontFamily: { display:['Jost','system-ui','sans-serif'], sans:['Inter','system-ui','sans-serif'] }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#14213D;--navy2:#1B2C50;--royal:#2A4C8A;--royal2:#3A5FA8;--steel:#787878;--line:#E6E9F0;--soft:#F4F6FB;--red:#C0392B;--amber:#D68910;--green:#2E7D52;}
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;color:#14213D;background:#fff;line-height:1.55;-webkit-font-smoothing:antialiased;font-size:14px}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{height:9px;width:9px}
  ::-webkit-scrollbar-thumb{background:#cfd6e4;border-radius:9px}
  ::-webkit-scrollbar-thumb:hover{background:#aab4c8}
  .font-display{font-family:'Jost',sans-serif}
  .brand{font-family:'Jost',sans-serif;font-weight:500;letter-spacing:-.01em}

  .navlink{position:relative;font-weight:500;color:#3a4256;padding:4px 2px;font-size:15px;transition:color .15s}
  .navlink:hover{color:var(--royal)}
  .navlink.active{color:var(--royal)}
  .navlink.active:after{content:"";position:absolute;left:0;right:0;bottom:-6px;height:2px;background:var(--royal)}

  .sidelink{display:flex;align-items:center;justify-content:space-between;padding:9px 0;font-size:15px;color:#5a6173;border-bottom:1px solid var(--line);cursor:pointer;transition:color .15s;font-weight:400}
  .sidelink:hover{color:var(--navy)}
  .sidelink.active{color:var(--royal);font-weight:500}
  .sidelink .dot{width:7px;height:7px;border-radius:50%;background:var(--royal);opacity:0;transition:.15s}
  .sidelink.active .dot{opacity:1}

  .work-card{position:relative;display:flex;flex-direction:column;min-height:340px;padding:26px 26px 24px;background:linear-gradient(158deg,#1d2f57 0%,#14213D 70%);color:#fff;overflow:hidden;border:1px solid rgba(255,255,255,.05);transition:transform .28s ease, box-shadow .28s ease}
  .work-card:hover{transform:translateY(-5px);box-shadow:0 22px 45px -22px rgba(20,33,61,.65)}
  .work-card .num{position:absolute;right:14px;bottom:-12px;font-family:'Jost',sans-serif;font-weight:300;font-size:128px;line-height:1;color:rgba(255,255,255,.10);pointer-events:none;transition:color .28s}
  .work-card:hover .num{color:rgba(106,150,242,.20)}
  .work-card .cat{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#9db2d8;font-weight:500}
  .work-card .nm{font-family:'Jost',sans-serif;font-weight:400;font-size:25px;line-height:1.18;margin-top:10px;max-width:80%}
  .work-card .go{margin-top:auto;font-size:12px;letter-spacing:.04em;color:#c3d2ee;opacity:0;transform:translateY(6px);transition:.28s}
  .work-card:hover .go{opacity:1;transform:none}
  .meta-k{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8aa0c8}
  .meta-v{font-size:13px;color:#dfe6f3}
  .chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;padding:3px 9px;border-radius:30px;text-transform:uppercase}

  .st{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 11px;border-radius:30px}
  .st:before{content:"";width:7px;height:7px;border-radius:50%}
  .st-Perencanaan{background:#eef2fb;color:#3a4f86}.st-Perencanaan:before{background:#8AA9D6}
  .st-Berjalan{background:#e9f3ec;color:#2E7D52}.st-Berjalan:before{background:#2E7D52}
  .st-Konstruksi{background:#fdf3e6;color:#a96a13}.st-Konstruksi:before{background:#D68910}
  .st-Selesai{background:#eceef2;color:#566}.st-Selesai:before{background:#787878}

  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 2px rgba(20,33,61,.04)}

  .ptab{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;color:#5a6173;cursor:pointer;font-weight:500;transition:.15s}
  .ptab:hover{background:var(--soft);color:var(--navy)}
  .ptab.active{background:var(--navy);color:#fff}
  .ptab.active .ic{color:#9db2d8}

  /* editable bits */
  [contenteditable]{outline:none;border-radius:6px;transition:background .12s, box-shadow .12s;padding:1px 4px;margin:-1px -2px}
  [contenteditable]:hover{background:#eef3ff}
  [contenteditable]:focus{background:#fff;box-shadow:0 0 0 2px rgba(42,76,138,.35)}
  [contenteditable]:empty:before{content:attr(data-ph);color:#aab2c2}
  .mini{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;color:var(--steel);cursor:pointer;font-size:13px;line-height:1;flex-shrink:0}
  .mini:hover{border-color:#b9c4dc;color:var(--navy)}
  .mini.danger:hover{border-color:#e1a7a0;color:#b23;background:#fdf3f1}
  .mini.sm-x{width:20px;height:20px;font-size:11px}
  .addrow{display:inline-flex;align-items:center;gap:6px;color:var(--royal);font-weight:600;font-size:13px;cursor:pointer;padding:7px 2px;user-select:none}
  .addrow:hover{text-decoration:underline}
  input[type=color]{-webkit-appearance:none;appearance:none;width:34px;height:30px;border:1px solid var(--line);border-radius:7px;padding:2px;background:#fff;cursor:pointer;flex-shrink:0}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:4px}
  .wk-input{width:62px;border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:13px;text-align:center;font-family:inherit;color:var(--navy)}
  .sel-sm{border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:13px;background:#fff;font-family:inherit;color:var(--navy)}

  .wbs-phase{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .wbs-head{display:flex;align-items:center;gap:12px;padding:11px 14px;cursor:pointer;background:var(--soft);font-weight:600;font-size:14px}
  .wbs-head .n{background:var(--royal);color:#fff;width:27px;height:27px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700}
  .wbs-head .ttl{flex:1;font-weight:600}
  .wbs-head .cv{font-size:11px;color:var(--royal);font-weight:700;flex-shrink:0}
  .wbs-head .wk{font-size:11px;color:var(--steel);font-weight:500;flex-shrink:0}
  .wbs-body{padding:6px 14px 12px;display:none}
  .wbs-body.open{display:block}
  .wbs-item{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px dashed #eef1f6;font-size:13.5px}
  .wbs-item:last-of-type{border-bottom:none}
  .wbs-item input[type=checkbox]{margin-top:2px;width:17px;height:17px;accent-color:var(--royal);cursor:pointer;flex-shrink:0}
  .wbs-item.done .tx{color:#9aa3b5;text-decoration:line-through}

  .gantt-editor{display:flex;flex-direction:column;gap:9px;margin:8px 0 16px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px}
  .gantt-edit-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .gantt-edit-row .ge-name{flex:1;min-width:150px;font-weight:600;font-size:13.5px;color:var(--navy)}
  .gantt-edit-row .ge-wk{font-size:12px;color:var(--steel);display:flex;align-items:center;gap:6px}
  .ms-edit-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .ms-edit-row .ms-label{flex:1;border:1px solid var(--line);border-radius:7px;padding:6px 10px;font-size:13px;font-family:inherit;color:var(--navy)}

  .gantt-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:12px}
  .gantt{min-width:920px;width:100%;border-collapse:collapse;font-size:12px}
  .gantt th,.gantt td{border:1px solid #eef1f6;padding:0}
  .gantt th{background:var(--soft);padding:7px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--steel)}
  .gantt th.lbl,.gantt td.lbl{text-align:left;padding:9px 12px;min-width:240px;position:sticky;left:0;background:#fff;font-weight:600;font-size:12.5px;z-index:2}
  .gantt th.lbl{background:var(--soft);z-index:3}
  .gantt td{height:32px}
  .bar{height:19px;border-radius:6px;margin:0 1px;position:relative}
  .bar .ms{font-size:9px;color:#fff;font-weight:700;text-align:center;line-height:19px;white-space:nowrap}
  .milestone{position:relative}
  .milestone:after{content:"◆";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:var(--red);font-size:14px}

  .chk{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .chk:last-child{border:none}
  .chk input{margin-top:2px;width:18px;height:18px;accent-color:var(--royal);cursor:pointer;flex-shrink:0}
  .chk .nm{font-weight:600;font-size:13.5px}
  .chk .ds{font-size:12.5px;color:var(--steel);margin-top:2px}
  .chk.done .nm{color:#9aa3b5;text-decoration:line-through}

  .tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff;letter-spacing:.03em;vertical-align:middle}
  .t-rumah{background:#2E7D52}.t-komersial{background:#2A4C8A}.t-interior{background:#7A5EA8}.t-master{background:#C0851F}.t-all{background:#5a6173}

  .mtg-card{border:1px solid var(--line);border-radius:14px;margin-bottom:16px;overflow:hidden}
  .mtg-head{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--soft);border-bottom:1px solid var(--line)}
  .mtg-no{background:var(--navy);color:#fff;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .mtg-title{flex:1;font-weight:700;font-size:15px;color:var(--navy)}
  .mtg-body{padding:16px}
  .agenda{border-left:3px solid var(--royal);padding:4px 0 6px 16px;margin-bottom:16px}
  .agenda-top{display:flex;align-items:center;gap:12px;margin-bottom:5px}
  .agenda .tm{font-size:11px;font-weight:700;color:var(--royal);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
  .agenda .tl{font-weight:700;font-size:14.5px;color:var(--navy)}
  .agenda ul{margin:0;padding:0;list-style:none;font-size:13.5px;color:#3a4256}
  .agenda li{display:flex;align-items:flex-start;gap:8px;margin:3px 0}
  .agenda li:before{content:"•";color:var(--royal);margin-top:1px}

  .sev{font-weight:700;font-size:11px;padding:3px 9px;border-radius:7px;color:#fff;text-align:center;white-space:nowrap}
  .s-h{background:var(--red)}.s-m{background:var(--amber)}.s-l{background:var(--green)}
  .matrix{display:grid;grid-template-columns:84px repeat(3,1fr);gap:5px;margin:6px 0 16px;max-width:560px}
  .matrix div{padding:9px;text-align:center;font-size:11px;font-weight:600;border-radius:7px}
  .mh{background:var(--soft);color:var(--steel)}
  .cell{color:#fff}
  .risk-tbl td{vertical-align:top}
  .risk-tbl .sel-sm{width:100%}

  .tree{font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;line-height:1.95;background:var(--navy);color:#e8eefb;padding:20px 22px;border-radius:12px;overflow-x:auto;white-space:pre}
  .tree .f{color:#7fa8f5}.tree .c{color:#7f8aa3}

  table.data{width:100%;border-collapse:collapse;font-size:13px}
  table.data th,table.data td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  table.data th{background:var(--soft);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--steel);font-weight:700}
  table.data tr:hover td{background:#fafbfe}

  .note{background:#eef3fc;border:1px solid #d4e0f7;border-radius:10px;padding:13px 15px;font-size:12.5px;color:#34507f}
  .note b{color:var(--navy)}

  .btn{display:inline-flex;align-items:center;gap:7px;background:var(--royal);color:#fff;border:none;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:hover{background:#1f3a6b}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
  .btn.ghost:hover{border-color:#b9c4dc;background:var(--soft)}
  .btn.dark{background:var(--navy)}.btn.dark:hover{background:#0e1830}
  .btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}

  .field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--steel);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;font-family:inherit;color:var(--navy);background:#fff;outline:none;transition:.15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--royal);box-shadow:0 0 0 3px rgba(42,76,138,.12)}

  .cover-up{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .cover-prev{width:128px;height:84px;border-radius:10px;border:1px solid var(--line);background:var(--soft);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .cover-prev img{width:100%;height:100%;object-fit:cover}
  .cover-prev span{font-size:11px;color:var(--steel);text-align:center;padding:0 6px}
  .cover-actions{display:flex;flex-direction:column;gap:7px;align-items:flex-start}
  .cover-hint{font-size:11px;color:var(--steel);margin:0;max-width:240px}

  .backdrop{position:fixed;inset:0;background:rgba(15,22,42,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:100;overflow-y:auto;animation:fade .18s ease}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:680px;box-shadow:0 30px 70px -20px rgba(15,22,42,.5);animation:pop .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
  .toast{background:var(--navy);color:#fff;padding:11px 18px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:0 12px 30px -10px rgba(15,22,42,.6);animation:tin .25s ease}
  @keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

  .fade-in{animation:vin .3s ease}
  @keyframes vin{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  @media print{header.topbar,.noprint{display:none!important}.card{break-inside:avoid}}
</style>
</head>
<body>

<header class="topbar sticky top-0 z-50 bg-white/90 backdrop-blur border-b border-line">
  <div class="max-w-[1240px] mx-auto px-6 h-[68px] flex items-center justify-between">
    <a href="#/works" class="brand text-[26px] text-navy">natar<span class="text-royal">.</span></a>
    <nav id="topnav" class="flex items-center gap-7"></nav>
  </div>
</header>

<main id="view"></main>

<footer class="noprint border-t border-line mt-10">
  <div class="max-w-[1240px] mx-auto px-6 py-10 grid md:grid-cols-3 gap-6 text-sm text-steel">
    <div>
      <div class="brand text-[22px] text-navy mb-2">natar<span class="text-royal">.</span></div>
      <p id="foot-full" class="max-w-xs leading-relaxed"></p>
    </div>
    <div>
      <div class="meta-k text-steel mb-2">Navigasi</div>
      <div class="flex flex-col gap-1">
        <a href="#/works" class="hover:text-royal">Works</a>
        <a href="#/about" class="hover:text-royal">About</a>
        <a href="#/admin" class="hover:text-royal">Kelola Proyek</a>
      </div>
    </div>
    <div>
      <div class="meta-k text-steel mb-2">Idea, Design, Enrich.</div>
      <p class="max-w-xs leading-relaxed">Studio arsitektur berbasis di Bandung. Setiap karya lahir dengan jiwa, dan harus memperkaya setiap manusia yang terlibat di dalamnya.</p>
    </div>
  </div>
  <div class="border-t border-line py-5 text-center text-xs text-steel">© <span id="yr"></span> PT Nata Ruang Nusantara — NataR Studio. Prototipe sistem internal.</div>
</footer>

<div id="modal"></div>
<div id="toast"></div>

<script>
/* =========================================================================
   NATAR STUDIO — portfolio + project-management (single file)
   Semua data per-proyek dapat diedit langsung (localStorage + import/export JSON)
   ========================================================================= */
const LS_KEY = 'natar_studio_v1';

const CATEGORIES = ['Residential','Landed Housing','Masterplan','Mixed Use','Infrastructure','Urban Design','Sports Facility','Landscape'];

const LIKE_OPTS = ['Sering','Kadang','Jarang'];
const IMPACT_OPTS = ['Rendah','Sedang','Tinggi'];

const LVL_NAME = {'s-h':'Tinggi','s-m':'Sedang','s-l':'Rendah'};

const STUDIO = {name:'natar',full:'PT Nata Ruang Nusantara',alias:'NataR Studio',tagline:'Idea, Design, Enrich.',city:'Bandung, Indonesia',
  about:'Kami percaya ada makna yang lebih dalam dari sekadar menggambar bangunan atau merancang kota. Setiap karya lahir dengan jiwa, dan harus memperkaya setiap manusia yang terlibat di dalamnya.'};
const EXPERTISE = ['Architecture','Interior Design','Landscape Design','Masterplan','Urban Design','Project Management'];
const TIMELINE = [
  ['2015','Pendirian <b>NataR Studio</b> di Bandung oleh sekelompok arsitek muda.'],
  ['2017','Resmi menjadi <b>PT Nata Ruang Nusantara</b>, beroperasi dengan nama NataR Studio.'],
  ['2019','Juara 1 Sayembara Revitalisasi Kawasan Cikapundung.'],
  ['2021','Masuk 10 Besar <b>BCI Asia Awards</b> — Indonesian Architects.'],
  ['2023','Penyelesaian <b>Intermodal Transit Hub Leuwipanjang</b> (fase 1).'],
  ['2025','Juara 1 <b>Future Arcologies GAFA</b> (Global Architecture &amp; Future Awards).']
];

const SEED = [
  {name:'Ambu Bata Villa',category:'Residential',type:'rumah',location:'Bandung, Indonesia',client:'Private',year:2024,status:'Konstruksi',value:'Rp 6,5 M',deadline:'Q4 2024',architect:'Ar. Raka Wijaya',team:'2 drafter · konsultan struktur',cover:'',description:'Vila privat dua lantai dengan ekspresi bata ekspos dan bukaan lebar yang merespons iklim tropis. Sirkulasi udara silang dan ruang dalam–luar yang menyatu menjadi inti gagasan desain.'},
  {name:'Intermodal Transit Hub Leuwipanjang',category:'Infrastructure',type:'master',location:'Bandung, Indonesia',client:'Dinas Perhubungan & PT KAI',year:2023,status:'Berjalan',value:'Rp 184 M',deadline:'2026',architect:'Ar. Dian Permata',team:'Tim multidisiplin · konsultan MEP & transportasi',cover:'',description:'Simpul integrasi BRT, kereta, dan angkutan kota. Tata massa menekankan kejelasan alur penumpang, naungan, dan ruang publik yang manusiawi di tengah kepadatan kota.'},

const slugify = s => (s||'').toString().toLowerCase().trim().replace(/&/g,' dan ').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'proyek';
function uniqueId(base,exceptId){ let id=base,i=2; while(state.projects.some(p=>p.id===id&&p.id!==exceptId)){ id=base+'-'+i; i++; } return id; }
const rid = ()=>Math.random().toString(36).slice(2,8);
function projectCode(name){ const w=(name||'').replace(/[^A-Za-z0-9 ]/g,'').split(/\s+/).filter(Boolean); if(!w.length)return 'PRJ'; let c=w.slice(0,3).map(x=>x[0]).join('').toUpperCase(); return c.length<2?(w[0].slice(0,3).toUpperCase()):c; }

const relevant = (tag,type)=> tag==='all' || tag.split(' ').includes(type);
const filteredIzin = type => IZIN.filter(it=>relevant(it[2],type));
const clampWeek = v => { v=parseInt(v)||1; return Math.min(Math.max(v,1),72); };
const riskLevel = (like,impact)=> (RISK_MATRIX[like]&&RISK_MATRIX[like][impact])||'s-m';

/* ---- seed builders for a project's editable data ---- */
function seedPhases(type){
  return WBS.map((ph,i)=>({
    id:'ph'+(i+1)+'-'+rid(),
    title:ph.t, ws:ph.s, we:ph.e, color:ph.c,
    items: ph.items.filter(it=>relevant(it[1],type)).map(it=>({text:it[0],done:false,tag:it[1]}))
  }));
}
const seedMilestones = ()=> MILESTONES_SEED.map(m=>({week:m[0],label:m[1]}));
const seedMeetings = ()=> [{id:'mtg-'+rid(),title:'Meeting Perdana (Kickoff)',date:'',blocks:AGENDA_SEED.map(a=>({time:a[0],title:a[1],points:a[2].slice()}))}];
const seedRisks = ()=> RISKS_SEED.map(r=>({title:r[0],like:r[1],impact:r[2],mit:r[3],pic:''}));

/* ---- repair / migrate a project so all editable arrays exist ---- */
function ensure(p){
  if(!Array.isArray(p.phases)||!p.phases.length){
    p.phases = seedPhases(p.type||'rumah');
    if(p.wbsDone){ p.phases.forEach((ph,i)=>{ const o=p.wbsDone[i+1]; if(Array.isArray(o)) ph.items.forEach((it,j)=>{ if(o[j]) it.done=true; }); }); }
    delete p.wbsDone;
  }
  p.phases.forEach(ph=>{ ph.ws=clampWeek(ph.ws); ph.we=clampWeek(ph.we); if(ph.we<ph.ws)ph.we=ph.ws; if(!/^#/.test(ph.color||''))ph.color='#2A4C8A'; ph.items=ph.items||[]; });
  if(!Array.isArray(p.milestones)) p.milestones = seedMilestones();
  if(!Array.isArray(p.meetings)||!p.meetings.length) p.meetings = seedMeetings();
  if(!Array.isArray(p.riskRows)||!p.riskRows.length) p.riskRows = seedRisks();
  if(!Array.isArray(p.izinDone)) p.izinDone=[];
  const il=filteredIzin(p.type||'rumah').length; while(p.izinDone.length<il)p.izinDone.push(false); p.izinDone=p.izinDone.slice(0,il);
  return p;
}
function normalize(x){
  const p=Object.assign({name:'Proyek',category:CATEGORIES[0],type:'rumah',location:'',client:'',year:new Date().getFullYear(),status:'Perencanaan',value:'',deadline:'',architect:'',team:'',cover:'',description:''}, x);
  if(!p.id) p.id=uniqueId(slugify(p.name));
  return ensure(p);
}
function newProject(d){ const base=Object.assign({},d); base.id=uniqueId(slugify(d.name||'proyek')); return normalize(base); }

function loadState(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ const p=JSON.parse(raw); if(p&&Array.isArray(p.projects)){ state={projects:p.projects.map(normalize)}; return; } } }catch(e){ console.warn('load gagal',e); }
  state={projects:SEED.map(normalize)}; saveState();
}
function saveState(){ try{ localStorage.setItem(LS_KEY,JSON.stringify(state)); }catch(e){ toast('Gagal menyimpan — penyimpanan browser penuh (gambar cover terlalu besar?)'); } }

function wbsProgress(p){ ensure(p); let total=0,done=0; p.phases.forEach(ph=>ph.items.forEach(it=>{ total++; if(it.done)done++; })); return {done,total,pct:total?Math.round(done/total*100):0}; }
function izinProgress(p){ ensure(p); const t=p.izinDone.length,d=p.izinDone.filter(Boolean).length; return {done:d,total:t,pct:t?Math.round(d/t*100):0}; }
function projWeeks(p){ let m=12; p.phases.forEach(ph=>{ if(ph.we>m)m=ph.we; }); p.milestones.forEach(ms=>{ if(ms.week>m)m=ms.week; }); return Math.min(Math.max(m,12),72); }

/* ---- apply an inline edit to the data model ---- */
function applyEdit(p,key,val){
  const a=key.split('.');
  try{
    switch(a[0]){
      case 'phase':{ const ph=p.phases[+a[2]]; if(!ph)break; if(a[1]==='ws')ph.ws=clampWeek(val); else if(a[1]==='we')ph.we=clampWeek(val); else if(a[1]==='color')ph.color=val; else ph.title=val; if(ph.we<ph.ws)ph.we=ph.ws; break; }
      case 'item':{ const ph=p.phases[+a[2]]; if(ph&&ph.items[+a[3]])ph.items[+a[3]].text=val; break; }
      case 'ms':{ const m=p.milestones[+a[2]]; if(!m)break; if(a[1]==='week')m.week=clampWeek(val); else m.label=val; break; }
      case 'meeting':{ const m=p.meetings[+a[2]]; if(m)m[a[1]]=val; break; }
      case 'block':{ const m=p.meetings[+a[2]]; if(m&&m.blocks[+a[3]])m.blocks[+a[3]][a[1]]=val; break; }
      case 'point':{ const m=p.meetings[+a[1]]; if(m&&m.blocks[+a[2]])m.blocks[+a[2]].points[+a[3]]=val; break; }
      case 'risk':{ const r=p.riskRows[+a[2]]; if(r)r[a[1]]=val; break; }
    }
  }catch(e){ console.warn('applyEdit',e); }
}

          <td class="font-display text-xl text-royal">${pad(i+1)}</td>

          <td><span class="text-xs text-steel">${esc(p.category)}</span><br><span class="tag t-${p.type}">${TYPE_LABEL[p.type]}</span></td>
          <td><span class="st st-${p.status}">${p.status}</span></td>
          <td><div class="flex items-center gap-2"><div class="w-16 h-1.5 bg-soft rounded-full"><div class="h-1.5 rounded-full bg-royal" style="width:${wp.pct}%"></div></div><span class="text-xs text-steel">${wp.pct}%</span></div></td>
          <td class="text-sm">${esc(p.client||'—')}</td>

            <button class="mini" data-action="up" data-id="${p.id}" title="Naik" ${i===0?'disabled style=opacity:.3':''}>↑</button>

            <button class="btn ghost sm" data-action="edit" data-id="${p.id}">Edit</button>
            <button class="btn ghost sm" data-action="del" data-id="${p.id}" style="color:#b23">Hapus</button>

      </table></div>

    <div class="note mt-5"><b>Penyimpanan:</b> data tersimpan di browser ini (localStorage). Gunakan <b>Export JSON</b> untuk backup / pindah perangkat, dan <b>Import JSON</b> untuk memuat kembali. <b>Reset</b> mengembalikan ke 6 proyek contoh. Gambar cover ikut tersimpan & terekspor.</div>

/* ---- project form modal (dengan upload cover) ---- */
let formCover='';
function openForm(id){
  const editing=!!id;
  const p=editing?state.projects.find(x=>x.id===id):newProject({name:''});
  formCover = editing ? (p.cover||'') : '';
  const opt=(arr,val,gv,gl)=>arr.map(o=>{const v=gv(o),l=gl(o);return `<option value="${esc(v)}" ${v==val?'selected':''}>${esc(l)}</option>`;}).join('');
  $('#modal').innerHTML=`
  <div class="backdrop" data-action="close-modal">
    <div class="modal" onclick="event.stopPropagation()">
      <form id="proj-form" class="p-7">
        <div class="flex items-center justify-between mb-5">
          <h3 class="font-display text-2xl text-navy">${editing?'Edit Info Proyek':'Tambah Proyek'}</h3>
          <button type="button" class="text-steel hover:text-navy text-2xl leading-none" data-action="close-modal">×</button>
        </div>
        <input type="hidden" name="pid" value="${editing?p.id:''}">
        <div class="grid sm:grid-cols-2 gap-4">
          <div class="field sm:col-span-2"><label>Nama proyek *</label><input name="name" required value="${esc(p.name)}" placeholder="mis. Ambu Bata Villa"></div>
          <div class="field"><label>Kategori</label><select name="category">${opt(CATEGORIES,p.category,c=>c,c=>c)}</select></div>
          <div class="field"><label>Tipe (untuk WBS/izin)</label><select name="type">${opt(TYPES,p.type,t=>t.v,t=>t.l)}</select></div>
          <div class="field"><label>Lokasi</label><input name="location" value="${esc(p.location)}" placeholder="Bandung, Indonesia"></div>
          <div class="field"><label>Klien</label><input name="client" value="${esc(p.client)}" placeholder="PT / Pemerintah / Private"></div>
          <div class="field"><label>Tahun</label><input name="year" type="number" value="${esc(p.year)}"></div>
          <div class="field"><label>Status</label><select name="status">${opt(STATUSES,p.status,s=>s,s=>s)}</select></div>
          <div class="field"><label>Nilai kontrak</label><input name="value" value="${esc(p.value)}" placeholder="Rp …"></div>
          <div class="field"><label>Deadline serah</label><input name="deadline" value="${esc(p.deadline)}" placeholder="Q4 2025 / 2027"></div>
          <div class="field"><label>Arsitek utama</label><input name="architect" value="${esc(p.architect)}"></div>
          <div class="field"><label>Tim</label><input name="team" value="${esc(p.team)}" placeholder="drafter, konsultan…"></div>
          <div class="field sm:col-span-2"><label>Gambar sampul (cover)</label>
            <div class="cover-up">
              <div class="cover-prev" id="cover-prev">${p.cover?`<img src="${p.cover}">`:'<span>Belum ada gambar</span>'}</div>
              <div class="cover-actions">
                <label class="btn ghost sm" style="cursor:pointer">⭱ Unggah gambar<input type="file" id="cover-file" accept="image/*" class="hidden"></label>
                <button type="button" class="btn ghost sm" data-action="cover-clear">Hapus gambar</button>
                <p class="cover-hint">JPG/PNG. Otomatis dikecilkan (maks 1200px) & disimpan di browser — tampil di kartu portofolio & header proyek.</p>
              </div>
            </div>
          </div>
          <div class="field sm:col-span-2"><label>Deskripsi</label><textarea name="description" rows="4" placeholder="Gagasan & konteks proyek…">${esc(p.description)}</textarea></div>
        </div>
        <div class="flex justify-end gap-2 mt-6">
          <button type="button" class="btn ghost" data-action="close-modal">Batal</button>
          <button type="submit" class="btn">${editing?'Simpan Perubahan':'Tambah Proyek'}</button>
        </div>
      </form>
    </div>
  </div>`;
}
function closeModal(){ $('#modal').innerHTML=''; }

function fileToCover(file,cb){
  const fr=new FileReader();
  fr.onload=()=>{ const img=new Image(); img.onload=()=>{ const max=1200; let w=img.width,h=img.height; if(w>max){ h=Math.round(h*max/w); w=max; } const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); cb(c.toDataURL('image/jpeg',0.82)); }; img.onerror=()=>toast('Gagal membaca gambar'); img.src=fr.result; };
  fr.onerror=()=>toast('Gagal membaca file'); fr.readAsDataURL(file);
}
function handleCoverFile(file){ if(!file.type.startsWith('image/')){ toast('File harus berupa gambar'); return; } fileToCover(file,durl=>{ formCover=durl; const pv=$('#cover-prev'); if(pv)pv.innerHTML=`<img src="${durl}">`; toast('Gambar dimuat'); }); }

function saveForm(form){
  const fd=new FormData(form); const d=Object.fromEntries(fd.entries());
  const editId=(d.pid||'').trim(); delete d.pid;
  if(!d.name.trim()){ toast('Nama proyek wajib diisi'); return; }
  d.year=parseInt(d.year)||new Date().getFullYear();
  d.cover=formCover;
  if(editId){ const p=state.projects.find(x=>x.id===editId); Object.assign(p,d); ensure(p); toast('Perubahan tersimpan'); }
  else { const p=newProject(d); state.projects.push(p); toast('Proyek ditambahkan'); }
  saveState(); closeModal(); renderAdmin();
}
function delProject(id){ const p=state.projects.find(x=>x.id===id); if(!p)return; if(!confirm(`Hapus proyek "${p.name}"? Tidak bisa dibatalkan (kecuali ada backup JSON).`))return; state.projects=state.projects.filter(x=>x.id!==id); saveState(); renderAdmin(); toast('Proyek dihapus'); }
function move(id,dir){ const i=state.projects.findIndex(x=>x.id===id),j=i+dir; if(j<0||j>=state.projects.length)return; const a=state.projects; [a[i],a[j]]=[a[j],a[i]]; saveState(); renderAdmin(); }

function exportJSON(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`natar-proyek-${new Date().toISOString().slice(0,10)}.json`; a.click(); URL.revokeObjectURL(a.href); toast('Data diekspor'); }
function importJSON(file){ const fr=new FileReader(); fr.onload=()=>{ try{ const obj=JSON.parse(fr.result); if(!obj||!Array.isArray(obj.projects))throw 0; state={projects:obj.projects.map(normalize)}; saveState(); renderAdmin(); toast('Data berhasil diimpor'); }catch(e){ toast('File JSON tidak valid'); } }; fr.readAsText(file); }
function resetData(){ if(!confirm('Reset ke 6 proyek contoh? Semua data saat ini hilang (kecuali sudah di-Export).'))return; state={projects:SEED.map(normalize)}; saveState(); renderAdmin(); toast('Data di-reset'); }

/* =========================================================================
   ROUTER
   ========================================================================= */
function router(){
  const hash=location.hash.replace(/^#\/?/,''); const [seg,id]=hash.split('/'); const s=seg||'works';
  renderNav(s==='project'?'works':s);
  if(s==='project'&&id) renderProject(id);
  else if(s==='about') renderAbout();
  else if(s==='admin') renderAdmin();
  else renderWorks();
  if(s!=='about') window.scrollTo({top:0});
}

/* =========================================================================
   EVENTS (delegation)
   ========================================================================= */
function rerenderTab(){ const p=currentProject(); if(p) paintTab(p); }

document.addEventListener('click', e=>{
  const a=e.target.closest('[data-action]'); if(!a) return;
  const act=a.dataset.action; const p=currentProject();
  switch(act){
    case 'filter':
      worksFilter=a.dataset.cat;
      document.querySelectorAll('#cat-list .sidelink').forEach(x=>x.classList.toggle('active',x.dataset.cat===worksFilter));
      paintGrid(); break;
    case 'tab':
      projTab=a.dataset.tab;
      document.querySelectorAll('#ptabs .ptab').forEach(x=>x.classList.toggle('active',x.dataset.tab===projTab));
      if(p) paintTab(p); break;
    case 'phase-toggle': {
      if(e.target.isContentEditable||e.target.closest('button')) break;
      const pi=+a.dataset.pi; if(wbsOpen.has(pi))wbsOpen.delete(pi); else wbsOpen.add(pi);
      a.parentElement.querySelector('.wbs-body').classList.toggle('open'); break; }
    case 'phase-add': if(p){ const last=p.phases[p.phases.length-1]; const ws=last?Math.min(last.we+1,72):1; p.phases.push({id:'ph-'+rid(),title:'Fase baru',ws,we:Math.min(ws+1,72),color:'#2A4C8A',items:[]}); wbsOpen.add(p.phases.length-1); saveState(); rerenderTab(); } break;
    case 'phase-del': if(p){ const pi=+a.dataset.pi; if(confirm('Hapus fase ini beserta seluruh deliverable-nya?')){ p.phases.splice(pi,1); wbsOpen=new Set([0]); saveState(); rerenderTab(); refreshProgress(p); } } break;
    case 'item-add': if(p){ p.phases[+a.dataset.pi].items.push({text:'Deliverable baru',done:false,tag:'all'}); saveState(); rerenderTab(); refreshProgress(p); } break;
    case 'item-del': if(p){ p.phases[+a.dataset.pi].items.splice(+a.dataset.ii,1); saveState(); rerenderTab(); refreshProgress(p); } break;
    case 'item-tag': if(p){ const order=['all','rumah','komersial','interior','master']; const it=p.phases[+a.dataset.pi].items[+a.dataset.ii]; it.tag=order[(order.indexOf(tagNorm(it.tag))+1)%order.length]; saveState(); rerenderTab(); } break;
    case 'ms-add': if(p){ p.milestones.push({week:Math.min(projWeeks(p),72),label:'Milestone'}); saveState(); rerenderTab(); } break;
    case 'ms-del': if(p){ p.milestones.splice(+a.dataset.i,1); saveState(); rerenderTab(); } break;
    case 'mtg-add': if(p){ p.meetings.push({id:'mtg-'+rid(),title:'Meeting baru',date:'',blocks:[{time:'',title:'Segmen 1',points:['']}]}); saveState(); rerenderTab(); } break;
    case 'mtg-del': if(p){ if(confirm('Hapus meeting ini?')){ p.meetings.splice(+a.dataset.mi,1); saveState(); rerenderTab(); } } break;
    case 'block-add': if(p){ p.meetings[+a.dataset.mi].blocks.push({time:'',title:'Segmen baru',points:['']}); saveState(); rerenderTab(); } break;
    case 'block-del': if(p){ p.meetings[+a.dataset.mi].blocks.splice(+a.dataset.bi,1); saveState(); rerenderTab(); } break;
    case 'point-add': if(p){ p.meetings[+a.dataset.mi].blocks[+a.dataset.bi].points.push(''); saveState(); rerenderTab(); } break;
    case 'point-del': if(p){ p.meetings[+a.dataset.mi].blocks[+a.dataset.bi].points.splice(+a.dataset.pti,1); saveState(); rerenderTab(); } break;
    case 'risk-add': if(p){ p.riskRows.push({title:'Risiko baru',like:'Kadang',impact:'Sedang',mit:'',pic:''}); saveState(); rerenderTab(); } break;
    case 'risk-del': if(p){ p.riskRows.splice(+a.dataset.ri,1); saveState(); rerenderTab(); } break;
    case 'cover-clear': { formCover=''; const pv=$('#cover-prev'); if(pv)pv.innerHTML='<span>Belum ada gambar</span>'; break; }
    case 'add': openForm(); break;
    case 'edit': openForm(a.dataset.id); break;
    case 'del': delProject(a.dataset.id); break;
    case 'up': move(a.dataset.id,-1); break;
    case 'down': move(a.dataset.id,1); break;
    case 'export': exportJSON(); break;
    case 'import': $('#import-file').click(); break;
    case 'reset': resetData(); break;
    case 'close-modal': closeModal(); break;
  }
});

document.addEventListener('input', e=>{
  const t=e.target;
  if(t.id==='works-search'){ worksSearch=t.value.toLowerCase(); paintGrid(); return; }
  if(t.isContentEditable && t.dataset.edit){ const p=currentProject(); if(!p)return; applyEdit(p,t.dataset.edit,t.innerText.trim()); saveSoon(); }
});

document.addEventListener('change', e=>{
  const t=e.target;
  const c=t.closest&&t.closest('input[type=checkbox][data-kind]');
  if(c){ const p=state.projects.find(x=>x.id===c.dataset.id); if(!p)return; ensure(p);
    if(c.dataset.kind==='wbs'){ const ph=p.phases[+c.dataset.pi]; if(ph&&ph.items[+c.dataset.ii]){ ph.items[+c.dataset.ii].done=c.checked; c.closest('.wbs-item').classList.toggle('done',c.checked); const cv=document.querySelector(`[data-cv="${c.dataset.pi}"]`); if(cv)cv.textContent=ph.items.filter(x=>x.done).length+'/'+ph.items.length; refreshProgress(p); } }
    else if(c.dataset.kind==='izin'){ p.izinDone[+c.dataset.idx]=c.checked; c.closest('.chk').classList.toggle('done',c.checked); }
    saveState(); return; }
  if(t.id==='import-file' && t.files[0]){ importJSON(t.files[0]); t.value=''; return; }
  if(t.id==='cover-file' && t.files[0]){ handleCoverFile(t.files[0]); t.value=''; return; }
  if(t.matches('input[data-edit]')||t.matches('select[data-edit]')){
    const p=currentProject(); if(!p)return;
    applyEdit(p,t.dataset.edit,t.value); saveState();
    const [k,f]=t.dataset.edit.split('.');
    if((k==='phase'&&['ws','we','color'].includes(f))||(k==='ms'&&f==='week')||(k==='risk'&&['like','impact'].includes(f))) paintTab(p);
  }
});

document.addEventListener('submit', e=>{ if(e.target.id==='proj-form'){ e.preventDefault(); saveForm(e.target); } });
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ closeModal(); return; }
  if(e.key==='Enter' && e.target.isContentEditable && !e.shiftKey){ e.preventDefault(); e.target.blur(); }
});

/* =========================================================================
   INIT
   ========================================================================= */
$('#yr').textContent=new Date().getFullYear();
$('#foot-full').textContent=STUDIO.full+' — '+STUDIO.alias+'.';
loadState();
window.addEventListener('hashchange', router);
if(!location.hash) location.hash='#/works';
router();
